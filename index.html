<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title></title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
  }

  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    display: grid;
    place-items: center;
    background: #000;
  }

  /* sfondo: stessa immagine, grande e sfocata */
  .stage::before {
    content: "";
    position: absolute;
    inset: -40px; /* evita bordi quando blur */
    background-image: url("FINALE-VERDE.PNG");
    background-size: cover;
    background-position: center;
    filter: blur(28px) brightness(0.75);
    transform: scale(1.1);
  }

  /* immagine principale: sempre tutta visibile */
  img {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>
  <div class="stage">
    <img src="finale-verde.png.png" alt="">
  </div>
</body>
</html>
